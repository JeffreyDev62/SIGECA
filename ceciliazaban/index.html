<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciando Sistema...</title>

    <meta http-equiv="refresh" content="1; url=login.php">

    <style>
        /* Estilos CSS para la pantalla de carga */
        body {
            /* Ocupar toda la pantalla y centrar el contenido */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            
            /* Estilos visuales */
            font-family: Arial, sans-serif;
            background-color: #f4f7f9; /* Fondo muy claro */
            color: #34495e; /* Texto oscuro, profesional */
            text-align: center;
        }

        .loader-container {
            padding: 40px;
            border-radius: 12px;
            background: #ffffff;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .loader-text {
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 20px;
            color: #007bff; /* Color primario del sistema (azul) */
        }
        
        /* Estilo simple de animación (opcional pero bonito) */
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            border-top: 4px solid #007bff;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto; /* Centrar el spinner */
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loader-container">
        <div class="spinner"></div>
        <div class="loader-text">
            Iniciando Sistema...
        </div>
        <small class="text-muted">Será redirigido automáticamente.</small>
    </div>
</body>
</html>
